apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: meeting-system
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      hostAliases:
        - ip: "192.168.23.110"
          hostnames:
            - "oauth-meeting.co"
            - "api-meeting.co"
            - "npd-meeting.co"

      containers:
        - name: backend
          image: gk123a/meeting-management-backend:v2.0.0-dev
          command: ["/bin/sh", "-c"]
          args:
            - |
              touch .env && 
              java -javaagent:/app/opentelemetry-javaagent.jar -jar app.jar
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          
          # Tự động nạp tất cả biến từ ConfigMap và Secret
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret # Sửa từ backend-secrets thành backend-secret
          
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/app/opentelemetry-javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: "backend-deployment"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://coroot.monitoring:8080/v1/traces"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"

            # Cấu hình Spring Datasource sử dụng các biến đã nạp từ envFrom
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef: # Chuyển từ configMapKeyRef sang secretKeyRef
                  name: backend-secret
                  key: DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret # Sửa tên thành backend-secret
                  key: DB_PASSWORD